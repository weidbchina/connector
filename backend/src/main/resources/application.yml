server:
  port: 8080
  servlet:
    context-path: /accounting-tool

spring:
  application:
    name: db-monitor
  datasource:
    url: jdbc:h2:file:./data/dbmonitor;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceName: DbMonitorScheduler
            instanceId: AUTO

logging:
  level:
    com.connector: INFO
    org.springframework.web: INFO
